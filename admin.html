<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>E-LegalBoom Admin Release</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f7fa;
      padding:40px;
    }
    .container{
      max-width:500px;
      margin:auto;
      background:white;
      padding:30px;
      border-radius:8px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }
    h1{ margin-bottom:20px; }
    input{
      width:100%;
      padding:12px;
      margin-bottom:20px;
      font-size:16px;
      border:1px solid #ccc;
      border-radius:4px;
    }
    button{
      width:100%;
      padding:15px;
      font-size:16px;
      background:#2c7be5;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
    button:hover{ background:#1a5fd1; }
    .result{
      margin-top:20px;
      padding:12px;
      background:#eef2f6;
      border-radius:4px;
      white-space:pre-wrap;
    }
    .hint{
      margin-top:10px;
      font-size:13px;
      color:#556;
      line-height:1.35;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>E-LegalBoom Admin Release</h1>

    <label for="orderId"><strong>Order ID</strong></label>
    <input id="orderId" placeholder="Paste Order UUID" autocomplete="off" spellcheck="false" />

    <button id="releaseBtn" onclick="releaseDocument()">Release Document</button>

    <div class="result" id="result">Ready.</div>

    <div class="hint">
      Replace the two constants in the script below with your real values:<br/>
      <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code>.<br/>
      This calls: <code>/functions/v1/admin_release</code>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vvjbjfltqsivvxxifnvi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2amJqZmx0cXNpdnZ4eGlmbnZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc5NzYzNTAsImV4cCI6MjA3MzU1MjM1MH0.F4zzcpCHl9v-Rnj0wgKJ5zBf1HteVyXelMLQDDEN28Q";

    async function releaseDocument(){
      const orderId = document.getElementById("orderId").value.trim();
      const resultEl = document.getElementById("result");
      const btn = document.getElementById("releaseBtn");

      if(!orderId){
        resultEl.innerText = "Please enter an Order ID.";
        return;
      }

      btn.disabled = true;
      btn.innerText = "Processing...";
      resultEl.innerText = "Processing order...";

      try{
        const response = await fetch(
          SUPABASE_URL + "/functions/v1/admin_release",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + SUPABASE_ANON_KEY
            },
            body: JSON.stringify({ order_id: orderId })
          }
        );

        const text = await response.text();
        let data = null;
        try { data = JSON.parse(text); } catch(e) {}

        if(!response.ok){
          resultEl.innerText = "ERROR (" + response.status + "):\n" + (data ? JSON.stringify(data, null, 2) : text);
        }else{
          resultEl.innerText = "SUCCESS:\n" + (data ? JSON.stringify(data, null, 2) : text);
        }
      }catch(err){
        resultEl.innerText = "Error processing order:\n" + (err && err.message ? err.message : String(err));
      }finally{
        btn.disabled = false;
        btn.innerText = "Release Document";
      }
    }
  </script>
</body>
</html>
