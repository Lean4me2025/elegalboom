<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>E-LegalBoom — Client Intake</title>

<style>
body{font-family:system-ui;padding:20px;background:#f5f7fb}
.panel{background:#fff;padding:20px;border-radius:12px;max-width:900px;margin:auto}
.pill{background:#eef3ff;padding:10px;border-radius:8px;margin-bottom:10px}
.docBox{display:none}
.docBox.active{display:block}
button{padding:14px;background:#1a4cff;color:#fff;border:none;border-radius:10px;width:100%}
</style>
</head>

<body>

<div class="panel">

<h2>Client Intake</h2>

<div class="pill">Tier: <span id="tierDisplay"></span></div>
<div class="pill">Document: <span id="docDisplay"></span></div>
<div class="pill">Price: <span id="priceDisplay"></span></div>

<form id="intakeForm">

<h3>Client Info</h3>
<input name="client_first_name" placeholder="First Name" required><br><br>
<input name="client_last_name" placeholder="Last Name" required><br><br>
<input name="client_email" placeholder="Email" required><br><br>

<h3>Document Details</h3>

<div class="docBox" data-doc="PROMISSORY_NOTE">
<input name="pn_lender_name" placeholder="Lender Name"><br><br>
<input name="pn_borrower_name" placeholder="Borrower Name"><br><br>
</div>

<div class="docBox" data-doc="NDA">
<input name="nda_disclosing_party" placeholder="Disclosing Party"><br><br>
<input name="nda_receiving_party" placeholder="Receiving Party"><br><br>
</div>

<br>
<button type="submit">Continue to Review</button>

</form>

</div>

<script>
/* =========================
   LOAD DATA FROM CATALOG
========================= */

const raw = sessionStorage.getItem("legal_selected_order");
const selectedOrder = raw ? JSON.parse(raw) : null;

if (!selectedOrder) {
  alert("Missing order from catalog");
  window.location.href = "catalog.html";
}

/* =========================
   DISPLAY HEADER
========================= */

document.getElementById("tierDisplay").textContent = selectedOrder.tier_name;
document.getElementById("docDisplay").textContent = selectedOrder.doc_type;
document.getElementById("priceDisplay").textContent = "$" + selectedOrder.tier_price;

/* =========================
   SHOW DOC SECTION
========================= */

function showDocSection(doc){
  document.querySelectorAll(".docBox").forEach(b => b.classList.remove("active"));
  const match = document.querySelector('[data-doc="'+doc+'"]');
  if(match) match.classList.add("active");
}

showDocSection(selectedOrder.doc_type);

/* =========================
   FORM SUBMIT
========================= */

document.getElementById("intakeForm").addEventListener("submit", function(e){

  e.preventDefault();

  const formData = new FormData(e.target);
  const intake = Object.fromEntries(formData.entries());

  const payload = {
    order_id: selectedOrder.order_id,
    doc_type: selectedOrder.doc_type,
    tier_name: selectedOrder.tier_name,
    tier_price: selectedOrder.tier_price,
    client_email: intake.client_email,
    intake: intake
  };

  sessionStorage.setItem("elegal_intake_data", JSON.stringify(payload));

  window.location.href = "review_and_pay.html";

});
</script>

</body>
</html>
