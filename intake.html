<script>
  const SUPABASE_URL = "https://vvjbjfltqsivvxxifnvi.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2amJqZmx0cXNpdnZ4eGlmbnZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc5NzYzNTAsImV4cCI6MjA3MzU1MjM1MH0.F4zzcpCHl9v-Rnj0wgKJ5zBf1HteVyXelMLQDDEN28Q";

  const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  function generateOrderId() {
    const now = new Date();
    const stamp =
      now.getFullYear().toString() +
      String(now.getMonth() + 1).padStart(2, "0") +
      String(now.getDate()).padStart(2, "0") +
      String(now.getHours()).padStart(2, "0") +
      String(now.getMinutes()).padStart(2, "0") +
      String(now.getSeconds()).padStart(2, "0");

    return "ELB-" + stamp;
  }

  function getSelectedOrder() {
    const raw = sessionStorage.getItem("legal_selected_order");
    if (!raw) return null;

    try {
      return JSON.parse(raw);
    } catch (e) {
      console.log("Session parse error:", e);
      return null;
    }
  }

  function renderSummary(order) {
    const el = document.getElementById("orderSummary");
    if (!order) {
      el.innerHTML = "No selected order found.";
      return;
    }

    el.innerHTML = `
      <strong>Tier:</strong> ${order.tier_name}<br/>
      <strong>Price:</strong> $${order.tier_price}<br/>
      <strong>Document:</strong> ${order.doc_type}
    `;
  }

  document.addEventListener("DOMContentLoaded", () => {
    const selected = getSelectedOrder();
    renderSummary(selected);
  });

  async function submitIntake() {
    const selected = getSelectedOrder();

    if (!selected) {
      alert("No order selected. Return to catalog.");
      return;
    }

    if (!selected.tier_name || !selected.tier_price || !selected.doc_type) {
      alert("Selected order is incomplete.");
      return;
    }

    const orderId = generateOrderId();

    const intakePayload = {
      client_first_name: document.getElementById("client_first_name")?.value || "",
      client_last_name: document.getElementById("client_last_name")?.value || "",
      client_email: document.getElementById("client_email")?.value || "",
      client_phone: document.getElementById("client_phone")?.value || "",
      governing_state: document.getElementById("governing_state")?.value || "",
      llc_name: document.getElementById("llc_name")?.value || "",
      agreement_date: document.getElementById("agreement_date")?.value || "",
      member_name: document.getElementById("member_name")?.value || "",
      member_address: document.getElementById("member_address")?.value || "",
      principal_business_address:
        document.getElementById("principal_business_address")?.value || "",
      capital_contribution_description:
        document.getElementById("capital_contribution_description")?.value || ""
    };

    const orderPayload = {
      order_id: orderId,
      tier_name: selected.tier_name,
      tier_price: selected.tier_price,
      doc_type: selected.doc_type,
      intake_json: intakePayload,
      order_status: "intake_complete",
      payment_status: "pending",
      created_at: new Date().toISOString()
    };

    const { error } = await supabaseClient
      .from("pweb_orders")
      .insert(orderPayload);

    if (error) {
      console.log("INSERT ERROR:", error);
      alert("Database error: " + error.message);
      return;
    }

    sessionStorage.setItem("order_id", orderId);

    window.location.href = "review-and-pay.html";
  }
</script>
